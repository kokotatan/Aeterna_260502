<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aeterna - シニアの終活特化、意思を残す遺産分配ソフト</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-container"></div>

    <main class="container">
        <header>
            <h1 class="logo">Aeterna</h1>
            <p class="subtitle">永遠に続く、あなたの想い</p>
        </header>

        <section class="card glass">
            <div class="card-content">
                <h2>生きた証と、継承の準備を。</h2>
                <p>
                    Aeterna（エテルナ）は、シニアのための次世代・遺産分配および意思表示プラットフォームです。
                    安全で確実な生体認証（World ID）を用いて、あなた自身であることを証明し、大切な人への想いを改ざん不可能な形で残します。
                </p>

                <div class="verification-section" id="unverified-state">
                    <div class="status-indicator pending"></div>
                    <h3>ご本人確認が必要です</h3>
                    <p class="small-text">ブロックチェーン技術を利用したWorld IDで、安全に本人確認を行います。</p>

                    <!-- IDKit widget will be mounted here -->
                    <div id="idkit-root"></div>
                    <div id="error-msg" class="error-msg"></div>
                </div>

                <div class="verification-section hidden" id="verified-state">
                    <div class="status-indicator success"></div>
                    <h3>認証完了</h3>
                    <p>本人確認が完了しました。遺産分配の設定を進めてください。</p>
                    <button class="secondary-btn">遺産分配ダッシュボードへ</button>
                </div>
            </div>
        </section>
    </main>

    <!-- React + World ID IDKit via CDN -->
    <script type="module">
        import React from 'https://esm.sh/react@18';
        import { createRoot } from 'https://esm.sh/react-dom@18/client';
        import { IDKitWidget, VerificationLevel } from 'https://esm.sh/@worldcoin/idkit@2';

        const errorMsgEl = document.getElementById('error-msg');
        const unverifiedState = document.getElementById('unverified-state');
        const verifiedState = document.getElementById('verified-state');

        // Load app_id and action from backend (keeps secrets server-side)
        const config = await fetch('/api/world-id-config').then(r => r.json());

        async function handleVerification(proof) {
            const response = await fetch('/api/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(proof),
            });
            const data = await response.json();
            if (!data.success) {
                throw new Error(data.detail || '認証サーバーエラー');
            }
        }

        function onSuccess() {
            unverifiedState.classList.add('hidden');
            verifiedState.classList.remove('hidden');
            errorMsgEl.style.display = 'none';
        }

        function WorldIDButton() {
            return React.createElement(
                IDKitWidget,
                {
                    app_id: config.app_id,
                    action: config.action,
                    verification_level: VerificationLevel.Device,
                    handleVerification: handleVerification,
                    onSuccess: onSuccess,
                    onError: (error) => {
                        errorMsgEl.textContent = '認証エラー: ' + (error?.message || String(error));
                        errorMsgEl.style.display = 'block';
                    },
                },
                ({ open }) => React.createElement(
                    'button',
                    { className: 'primary-btn', onClick: open },
                    React.createElement('span', { className: 'btn-icon' }, '👁️'),
                    ' World IDで認証する'
                )
            );
        }

        const root = createRoot(document.getElementById('idkit-root'));
        root.render(React.createElement(WorldIDButton));
    </script>
</body>
</html>
